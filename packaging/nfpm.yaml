name: pastebox-cli
arch: "${PACKAGE_ARCH}"
platform: linux
version: "${PACKAGE_VERSION}"
release: "1"
section: utils
priority: optional
maintainer: kmw_
description: Terminal client for the Pastebox text sharing service
vendor: Pastebox
homepage: https://github.com/kmw0410/pastebox-cli
license: MIT
contents:
  - src: "${PACKAGE_BINARY}"
    dst: /usr/bin/pb
    expand: true
    file_info:
      mode: 0755
  - src: ./LICENSE
    dst: /usr/share/doc/pastebox-cli/LICENSE
  - src: ./package.md
    dst: /usr/share/doc/pastebox-cli/package.md
  - src: ./package_ko.md
    dst: /usr/share/doc/pastebox-cli/package_ko.md
