name: Arch Package Build

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to package as pkg.tar.zst
        required: true
        type: string

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate and checkout release tag
        id: tag
        env:
          TAG: ${{ inputs.tag }}
        shell: bash
        run: |
          git fetch --tags --force
          if [[ ! "$TAG" =~ ^v[0-9][0-9A-Za-z._-]*$ ]]; then
            echo "Invalid tag input: $TAG" >&2
            exit 1
          fi
          git rev-parse --verify "${TAG}^{commit}" >/dev/null
          git checkout --detach "$TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Run CLI tests
        shell: bash
        run: go test ./...

      - name: Install nFPM
        shell: bash
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.47.0

      - name: Build Arch packages
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        shell: bash
        run: |
          SHORT_SHA="$(git rev-parse --short HEAD)"
          NORMALIZED_VERSION="${TAG#v}"
          NORMALIZED_VERSION="${NORMALIZED_VERSION//-/.}"
          mkdir -p dist/build

          for ENTRY in "amd64:x86_64" "arm64:aarch64"; do
            GO_ARCH="${ENTRY%%:*}"
            ARCH_ARCH="${ENTRY##*:}"
            BINARY="$PWD/dist/build/pb_${GO_ARCH}"

            CGO_ENABLED=0 GOOS=linux GOARCH="$GO_ARCH" go build \
              -trimpath \
              -ldflags "-s -w -X main.version=${TAG} -X main.commit=${SHORT_SHA}" \
              -o "$BINARY" .

            PACKAGE_ARCH="$GO_ARCH" \
            PACKAGE_VERSION="$NORMALIZED_VERSION" \
            PACKAGE_BINARY="$BINARY" \
              nfpm package \
                --config packaging/nfpm.yaml \
                --packager archlinux \
                --target "dist/pastebox-cli-${NORMALIZED_VERSION}-1-${ARCH_ARCH}.pkg.tar.zst"
          done

      - name: Verify Arch packages
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        shell: bash
        run: |
          PACKAGE_VERSION="${TAG#v}"
          PACKAGE_VERSION="${PACKAGE_VERSION//-/.}"

          ARCH_FILE="pastebox-cli-${PACKAGE_VERSION}-1-x86_64.pkg.tar.zst"
          docker run --rm \
            --platform linux/amd64 \
            -v "$PWD/dist:/dist:ro" \
            archlinux:base \
            sh -c "pacman -U --noconfirm /dist/${ARCH_FILE} && pb version | grep -F '${TAG}'"

          ARM_ARCH_FILE="pastebox-cli-${PACKAGE_VERSION}-1-aarch64.pkg.tar.zst"
          docker run --rm \
            --platform linux/amd64 \
            -v "$PWD/dist:/dist:ro" \
            archlinux:base \
            sh -c "bsdtar -xOf /dist/${ARM_ARCH_FILE} .PKGINFO | grep -F 'arch = aarch64'"

      - name: Write package metadata
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        shell: bash
        run: |
          printf '%s\n' "$TAG" > dist/release-tag.txt
          (
            cd dist
            sha256sum ./*.pkg.tar.zst > checksums.txt
          )

      - name: Upload Arch package artifact
        uses: actions/upload-artifact@v4
        with:
          name: pastebox-cli-arch-packages
          path: |
            dist/*.pkg.tar.zst
            dist/checksums.txt
            dist/release-tag.txt
          if-no-files-found: error
          retention-days: 7
