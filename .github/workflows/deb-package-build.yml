name: Debian Package Build

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to package as deb
        required: true
        type: string

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate and checkout release tag
        id: tag
        env:
          TAG: ${{ inputs.tag }}
        shell: bash
        run: |
          git fetch --tags --force
          if [[ ! "$TAG" =~ ^v[0-9][0-9A-Za-z._-]*$ ]]; then
            echo "Invalid tag input: $TAG" >&2
            exit 1
          fi
          git rev-parse --verify "${TAG}^{commit}" >/dev/null
          git checkout --detach "$TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Run CLI tests
        shell: bash
        run: go test ./...

      - name: Install nFPM
        shell: bash
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.47.0

      - name: Build Debian packages
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        shell: bash
        run: |
          SHORT_SHA="$(git rev-parse --short HEAD)"
          NORMALIZED_VERSION="${TAG#v}"
          NORMALIZED_VERSION="${NORMALIZED_VERSION//-/.}"
          mkdir -p dist/build

          for ENTRY in "amd64:amd64" "arm64:arm64"; do
            GO_ARCH="${ENTRY%%:*}"
            DEB_ARCH="${ENTRY##*:}"
            BINARY="$PWD/dist/build/pb_${GO_ARCH}"

            CGO_ENABLED=0 GOOS=linux GOARCH="$GO_ARCH" go build \
              -trimpath \
              -ldflags "-s -w -X main.version=${TAG} -X main.commit=${SHORT_SHA}" \
              -o "$BINARY" .

            PACKAGE_ARCH="$GO_ARCH" \
            PACKAGE_VERSION="$NORMALIZED_VERSION" \
            PACKAGE_BINARY="$BINARY" \
              nfpm package \
                --config packaging/nfpm.yaml \
                --packager deb \
                --target "dist/pastebox-cli_${NORMALIZED_VERSION}-1_${DEB_ARCH}.deb"
          done

      - name: Set up QEMU for package tests
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Verify Debian packages
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        shell: bash
        run: |
          PACKAGE_VERSION="${TAG#v}"
          PACKAGE_VERSION="${PACKAGE_VERSION//-/.}"

          for ENTRY in "amd64:amd64" "arm64:arm64"; do
            PLATFORM="${ENTRY%%:*}"
            DEB_ARCH="${ENTRY##*:}"
            DEB_FILE="pastebox-cli_${PACKAGE_VERSION}-1_${DEB_ARCH}.deb"
            docker run --rm \
              --platform "linux/${PLATFORM}" \
              -v "$PWD/dist:/dist:ro" \
              debian:stable-slim \
              sh -c "dpkg -i /dist/${DEB_FILE} && pb version | grep -F '${TAG}'"
          done

      - name: Write package metadata
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        shell: bash
        run: |
          printf '%s\n' "$TAG" > dist/release-tag.txt
          (
            cd dist
            sha256sum ./*.deb > checksums.txt
          )

      - name: Upload Debian package artifact
        uses: actions/upload-artifact@v4
        with:
          name: pastebox-cli-deb-packages
          path: |
            dist/*.deb
            dist/checksums.txt
            dist/release-tag.txt
          if-no-files-found: error
          retention-days: 7
