name: Release

on:
  workflow_run:
    workflows:
      - CLI Package Build
    types:
      - completed
  workflow_dispatch:
    inputs:
      run_id:
        description: CLI Package Build run ID to use for package artifacts
        required: true
        type: string

jobs:
  release:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'workflow_run')
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref || github.event.workflow_run.head_sha }}

      - name: Download CLI packages from workflow_run
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v5
        with:
          name: pastebox-cli-packages
          path: ${{ runner.temp }}/pastebox-cli-packages
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download CLI packages from workflow_dispatch
        if: github.event_name == 'workflow_dispatch'
        uses: actions/download-artifact@v5
        with:
          name: pastebox-cli-packages
          path: ${{ runner.temp }}/pastebox-cli-packages
          run-id: ${{ inputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release tag from package artifact
        id: tag
        shell: bash
        run: |
          git fetch --tags --force
          PACKAGE_DIR="$RUNNER_TEMP/pastebox-cli-packages"
          TAG="$(tr -d '\r\n' < "$PACKAGE_DIR/release-tag.txt")"

          if [[ ! "$TAG" =~ ^v[0-9][0-9A-Za-z._-]*$ ]]; then
            echo "Invalid release tag in package artifact: $TAG" >&2
            exit 1
          fi

          git rev-parse --verify "${TAG}^{commit}" >/dev/null
          git checkout --detach "$TAG"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Using tag: $TAG"

      - name: Generate release notes
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.tag }}"

          {
            echo "## CLI Packages"
            echo
            echo "- Debian / Ubuntu: .deb"
            echo "- Arch Linux: .pkg.tar.zst"
            echo "- [CLI installation and usage](https://github.com/${GITHUB_REPOSITORY}/blob/${TAG}/package.md)"
            echo
            echo "## Changes"
            echo
            PREVIOUS_TAG="$(git tag --sort=-v:refname | grep '^v' | grep -vx "$TAG" | head -n 1)"
            if [ -n "$PREVIOUS_TAG" ]; then
              git log "${PREVIOUS_TAG}..${TAG}" --pretty=format:"- %s (%h)" --no-merges
            else
              git log "$TAG" --pretty=format:"- %s (%h)" --no-merges
            fi
            echo
          } > release-notes.md

      - name: Create immutable GitHub Release with CLI packages
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          PACKAGE_DIR="$RUNNER_TEMP/pastebox-cli-packages"

          if gh release view "$TAG" >/dev/null 2>&1; then
            RELEASE_ASSETS="$(gh release view "$TAG" --json assets --jq '.assets[].name')"
            MISSING=0
            for FILE in "$PACKAGE_DIR"/*.deb "$PACKAGE_DIR"/*.pkg.tar.zst "$PACKAGE_DIR/checksums.txt"; do
              NAME="$(basename "$FILE")"
              if ! grep -Fxq "$NAME" <<< "$RELEASE_ASSETS"; then
                echo "Immutable release $TAG is missing asset: $NAME" >&2
                MISSING=1
              fi
            done
            if [ "$MISSING" -ne 0 ]; then
              echo "Create a new release tag; published immutable releases cannot accept additional assets." >&2
              exit 1
            fi
            echo "Release $TAG already contains every CLI package asset."
            exit 0
          fi

          gh release create "$TAG" \
            "$PACKAGE_DIR"/*.deb \
            "$PACKAGE_DIR"/*.pkg.tar.zst \
            "$PACKAGE_DIR/checksums.txt" \
            --verify-tag \
            --title "$TAG" \
            --notes-file release-notes.md
