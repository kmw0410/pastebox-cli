name: Release

on:
  workflow_run:
    workflows:
      - CLI Package Build
    types:
      - completed
  workflow_dispatch:
    inputs:
      run_id:
        description: CLI Package Build run ID to use for package artifacts
        required: true
        type: string

jobs:
  release:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
      github.event