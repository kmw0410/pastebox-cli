name: Release Build

on:
  push:
    paths-ignore:
      - "**/*.md"
      - ".gitignore"
      - ".github/workflows/**"
      - "**/LICENSE"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - ".gitignore"
      - ".github/workflows/**"
      - "**/LICENSE"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-build
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        shell: bash
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "The following files are not formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Run go vet
        shell: bash
        run: go vet ./...

      - name: Run tests
        shell: bash
        run: go test ./...

  tag:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: test
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set release tag
        id: version
        shell: bash
        run: |
          BASE_TAG="v$(date -u +'%y.%m.%d')"
          TAG="$BASE_TAG"
          COUNT=0

          git fetch --tags --force

          while git rev-parse "$TAG" >/dev/null 2>&1; do
            COUNT=$((COUNT + 1))
            TAG="${BASE_TAG}-${COUNT}"
          done

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Using tag: $TAG"

      - name: Create git tag
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.tag }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
