name: CLI Package Build

on:
  workflow_run:
    workflows:
      - Release Build
    types:
      - completed
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to package
        required: true
        type: string

permissions:
  actions: read
  contents: read

jobs:
  resolve:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref || github.event.workflow_run.head_sha }}

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          git fetch --tags --force

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
            if [[ ! "$TAG" =~ ^v[0-9][0-9A-Za-z._-]*$ ]]; then
              echo "Invalid tag input: $TAG" >&2
              exit 1
            fi
            git rev-parse --verify "${TAG}^{commit}" >/dev/null
          else
            SHA="${{ github.event.workflow_run.head_sha }}"
            TAG="$(git tag --points-at "$SHA" | grep '^v' | sort -V | tail -n 1)"
          fi

          if [ -z "$TAG" ]; then
            echo "No release tag found." >&2
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Using tag: $TAG"

  deb:
    needs: resolve
    uses: ./.github/workflows/deb-package-build.yml
    with:
      tag: ${{ needs.resolve.outputs.tag }}

  arch:
    needs: resolve
    uses: ./.github/workflows/arch-package-build.yml
    with:
      tag: ${{ needs.resolve.outputs.tag }}

  rpm:
    needs: resolve
    uses: ./.github/workflows/rpm-package-build.yml
    with:
      tag: ${{ needs.resolve.outputs.tag }}

  collect:
    needs:
      - resolve
      - deb
      - arch
      - rpm
    runs-on: ubuntu-latest

    steps:
      - name: Download Debian packages
        uses: actions/download-artifact@v5
        with:
          name: pastebox-cli-deb-packages
          path: ${{ runner.temp }}/deb

      - name: Download Arch packages
        uses: actions/download-artifact@v5
        with:
          name: pastebox-cli-arch-packages
          path: ${{ runner.temp }}/arch

      - name: Download RPM packages
        uses: actions/download-artifact@v5
        with:
          name: pastebox-cli-rpm-packages
          path: ${{ runner.temp }}/rpm

      - name: Collect release packages
        env:
          TAG: ${{ needs.resolve.outputs.tag }}
        shell: bash
        run: |
          mkdir -p dist
          cp "$RUNNER_TEMP"/deb/*.deb dist/
          cp "$RUNNER_TEMP"/arch/*.pkg.tar.zst dist/
          cp "$RUNNER_TEMP"/rpm/*.rpm dist/
          printf '%s\n' "$TAG" > dist/release-tag.txt
          (
            cd dist
            sha256sum ./*.deb ./*.pkg.tar.zst ./*.rpm > checksums.txt
          )

      - name: Upload combined release artifact
        uses: actions/upload-artifact@v4
        with:
          name: pastebox-cli-packages
          path: |
            dist/*.deb
            dist/*.pkg.tar.zst
            dist/*.rpm
            dist/checksums.txt
            dist/release-tag.txt
          if-no-files-found: error
          retention-days: 7
