name: CLI Package Build

on:
  workflow_run:
    workflows:
      - Release Build
    types:
      - completed
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to package
        required: true
        type: string

jobs:
  package:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref || github.event.workflow_run.head_sha }}

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          git fetch --tags --force

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
            if [[ ! "$TAG" =~ ^v[0-9][0-9A-Za-z._-]*$ ]]; then
              echo "Invalid tag input: $TAG" >&2
              exit 1
            fi
            git rev-parse --verify "${TAG}^{commit}" >/dev/null
          else
            SHA="${{ github.event.workflow_run.head_sha }}"
            TAG="$(git tag --points-at "$SHA" | grep '^v' | sort -V | tail -n 1)"
          fi

          if [ -z "$TAG" ]; then
            echo "No release tag found." >&2
            exit 1
          fi

          git checkout --detach "$TAG"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Using tag: $TAG"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Run CLI tests
        shell: bash
        run: go test ./...

      - name: Install nFPM
        shell: bash
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.47.0

      - name: Build CLI binaries
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          SHORT_SHA="$(git rev-parse --short HEAD)"
          mkdir -p dist/build

          for ARCH in amd64 arm64; do
            CGO_ENABLED=0 GOOS=linux GOARCH="$ARCH" go build \
              -trimpath \
              -ldflags "-s -w -X main.version=${TAG} -X main.commit=${SHORT_SHA}" \
              -o "dist/build/pb_${ARCH}" .
          done

      - name: Build Linux packages
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          PACKAGE_VERSION="${TAG#v}"
          PACKAGE_VERSION="${PACKAGE_VERSION//-/.}"

          for ARCH in amd64 arm64; do
            if [ "$ARCH" = "amd64" ]; then
              DEB_ARCH="amd64"
              ARCH_ARCH="x86_64"
            else
              DEB_ARCH="arm64"
              ARCH_ARCH="aarch64"
            fi

            export PACKAGE_ARCH="$ARCH"
            export PACKAGE_VERSION
            export PACKAGE_BINARY="$PWD/dist/build/pb_${ARCH}"

            nfpm package \
              --config packaging/nfpm.yaml \
              --packager deb \
              --target "dist/pastebox-cli_${PACKAGE_VERSION}-1_${DEB_ARCH}.deb"
            nfpm package \
              --config packaging/nfpm.yaml \
              --packager archlinux \
              --target "dist/pastebox-cli-${PACKAGE_VERSION}-1-${ARCH_ARCH}.pkg.tar.zst"
          done

          printf '%s\n' "$TAG" > dist/release-tag.txt
          (
            cd dist
            sha256sum ./*.deb ./*.pkg.tar.zst > checksums.txt
          )

      - name: Set up QEMU for package tests
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Verify Linux packages
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          PACKAGE_VERSION="${TAG#v}"
          PACKAGE_VERSION="${PACKAGE_VERSION//-/.}"

          for ENTRY in "amd64:amd64" "arm64:arm64"; do
            PLATFORM="${ENTRY%%:*}"
            DEB_ARCH="${ENTRY##*:}"
            DEB_FILE="pastebox-cli_${PACKAGE_VERSION}-1_${DEB_ARCH}.deb"
            docker run --rm \
              --platform "linux/${PLATFORM}" \
              -v "$PWD/dist:/dist:ro" \
              debian:stable-slim \
              sh -c "dpkg -i /dist/${DEB_FILE} && pb version | grep -F '${TAG}'"
          done

          ARCH_FILE="pastebox-cli-${PACKAGE_VERSION}-1-x86_64.pkg.tar.zst"
          docker run --rm \
            --platform linux/amd64 \
            -v "$PWD/dist:/dist:ro" \
            archlinux:base \
            sh -c "pacman -U --noconfirm /dist/${ARCH_FILE} && pb version | grep -F '${TAG}'"

          ARM_ARCH_FILE="pastebox-cli-${PACKAGE_VERSION}-1-aarch64.pkg.tar.zst"
          docker run --rm \
            --platform linux/amd64 \
            -v "$PWD/dist:/dist:ro" \
            archlinux:base \
            sh -c "bsdtar -xOf /dist/${ARM_ARCH_FILE} .PKGINFO | grep -F 'arch = aarch64'"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: pastebox-cli-packages
          path: |
            dist/*.deb
            dist/*.pkg.tar.zst
            dist/checksums.txt
            dist/release-tag.txt
          if-no-files-found: error
          retention-days: 7
